# CNB 云原生开发配置：启动 48GB 共享 GPU 开发环境测试 Video2X
$:
  vscode:
    - name: video2x-cnb-gpu-test
      runner:
        tags: cnb:arch:amd64:gpu
      docker:
        # 官方自定义开发环境写法：直接指向 Dockerfile
        build: .ide/Dockerfile
      services:
        - vscode
        - docker
      env:
        VIDEO2X_VERSION: "6.4.0"
      stages:
        - name: show runtime base
          script: |
            echo "== CNB runtime image check =="
            cat /etc/os-release || true
            ldd --version | head -n 1 || true
            command -v code-server && code-server --version | head -n 1 || true
            echo "== GPU =="
            nvidia-smi --query-gpu=name,memory.total,driver_version --format=csv,noheader || true
